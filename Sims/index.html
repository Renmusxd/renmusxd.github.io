<DOCTYPE "html">
<html>
<head>
  <meta http-equiv="content-type" content="text/html; charset=UTF-8">
  <title>Emergent Behavior</title>
  
  <!-- Include jQuery -->
  <script type='text/javascript' src='https://ajax.googleapis.com/ajax/libs/jquery/1.7.2/jquery.min.js'></script>
  <script type='text/javascript' src='js/script.js'></script>
</head>

<body id="body">
<p>Life on a Torus</p>
    <canvas id="emergentCanvas" width="500" height="500" style="border:1px solid #000000;">
    </canvas>
    <p><input type="range" min="0" max="100" value="0" onchange="showValueWeight(this.value)"/>
    Weight: <span id="weight_text">0</span></p>
    <p><input type="range" min="1" max="10" value="1" onchange="showValueK(this.value)"/>
    K: <span id="k_text">1</span></p>
    <p><input type="range" min="0" max="1000" value="1" onchange="showValueMax(this.value)"/>
    MaxD: <span id="max_text">1</span></p>
    <script>
        function showValueWeight(newValue){
            document.getElementById("weight_text").innerHTML=newValue/100.0;
            alpha = 1-newValue/100.0;
            beta = newValue/100.0;
        }
        function showValueK(newValue){
            document.getElementById("k_text").innerHTML=newValue;
            k = newValue;
        }
        function showValueMax(newValue){
            document.getElementById("max_text").innerHTML=newValue;
            maxd = newValue;
        }
    </script>

</body>


</html>
